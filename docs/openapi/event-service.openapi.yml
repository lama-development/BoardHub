openapi: 3.0.3
info:
  title: BoardHub Event Service API
  version: 0.15.0
  description: API REST dell'event-service BoardHub per leggere eventi di gioco e calcolare movimenti su griglia.
servers:
  - url: http://localhost:8082
    description: Ambiente locale di sviluppo
tags:
  - name: Health
    description: Stato tecnico del servizio
  - name: Events
    description: Lettura eventi di gioco
  - name: Sessions
    description: Creazione e gestione sessioni di gioco
  - name: Movement
    description: Calcolo movimento su griglia
paths:
  /actuator/health:
    get:
      tags:
        - Health
      summary: Verifica lo stato del servizio
      responses:
        "200":
          description: Servizio attivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                up:
                  value:
                    status: UP
  /api/v1/sessions:
    post:
      tags:
        - Sessions
      summary: Crea una sessione di gioco
      description: Crea una sessione D&D attiva con configurazione iniziale della griglia.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameSessionRequest"
            examples:
              demoSession:
                value:
                  sessionId: session-20260705-001
                  venueId: venue-01
                  tableId: table-04
                  title: Cripta del Re Caduto
                  gameType: DND
                  grid:
                    width: 3
                    height: 3
                    difficultCells:
                      - C1
                    blockedCells:
                      - A2
                    obstacleCells: []
                    occupiedCells:
                      - A1
                    walls:
                      - cell: B1
                        direction: SOUTH
                    traps:
                      - trapId: trap-01
                        cell: B1
                        visibility: HIDDEN
                        armed: true
      responses:
        "201":
          description: Sessione creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGameSessionResponse"
              examples:
                created:
                  value:
                    sessionId: session-20260705-001
                    venueId: venue-01
                    tableId: table-04
                    title: Cripta del Re Caduto
                    gameType: DND
                    status: ACTIVE
                    gridWidth: 3
                    gridHeight: 3
                    createdAt: "2026-07-05T16:00:00Z"
        "400":
          description: Richiesta non valida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingGrid:
                  value:
                    code: BAD_REQUEST
                    message: La griglia iniziale e obbligatoria.
        "409":
          description: Sessione gia esistente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicateSession:
                  value:
                    code: DUPLICATE_SESSION
                    message: "Sessione gia esistente: session-20260705-001"
  /api/v1/sessions/{sessionId}/events:
    get:
      tags:
        - Events
      summary: Restituisce gli eventi salvati di una sessione
      description: Gli eventi vengono restituiti in ordine crescente di sequenceNumber.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Identificativo della sessione di gioco.
          schema:
            type: string
          example: session-20260630-001
      responses:
        "200":
          description: Lista eventi della sessione
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameEvent"
              examples:
                moveEvent:
                  value:
                    - eventId: evt-000001
                      eventType: MOVE
                      venueId: venue-01
                      tableId: table-04
                      sessionId: session-20260630-001
                      source: SIMULATOR
                      occurredAt: "2026-06-30T17:45:00Z"
                      sequenceNumber: 2
                      payload:
                        characterId: adv-01
                        from: A3
                        to: A4
  /api/v1/movement/reachable-cells:
    post:
      tags:
        - Movement
      summary: Calcola le celle raggiungibili
      description: Calcola celle raggiungibili, costo, percorso e trappole attraversate partendo da una griglia fornita nella richiesta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReachableCellsRequest"
            examples:
              simpleMovement:
                value:
                  characterId: adv-01
                  start: A1
                  movementPoints: 2
                  grid:
                    width: 3
                    height: 3
                    difficultCells:
                      - C1
                    blockedCells:
                      - A2
                    obstacleCells: []
                    occupiedCells: []
                    walls:
                      - cell: B1
                        direction: SOUTH
                    traps:
                      - trapId: trap-01
                        cell: B1
                        visibility: HIDDEN
                        armed: true
      responses:
        "200":
          description: Celle raggiungibili calcolate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReachableCellsResponse"
              examples:
                reachableCells:
                  value:
                    characterId: adv-01
                    reachableCells:
                      - cell: A1
                        cost: 0
                        path:
                          - A1
                        trapsOnPath: []
                      - cell: B1
                        cost: 1
                        path:
                          - A1
                          - B1
                        trapsOnPath: []
        "400":
          description: Richiesta non valida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidStart:
                  value:
                    code: BAD_REQUEST
                    message: "Formato cella non valido: 1A"
  /api/v1/sessions/{sessionId}/movement/reachable-cells:
    post:
      tags:
        - Movement
      summary: Calcola le celle raggiungibili da una sessione salvata
      description: Ricostruisce la griglia persistita della sessione e calcola celle raggiungibili, costo, percorso e trappole attraversate.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Identificativo della sessione di gioco.
          schema:
            type: string
          example: session-20260705-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionReachableCellsRequest"
            examples:
              sessionMovement:
                value:
                  characterId: adv-01
                  start: A1
                  movementPoints: 2
      responses:
        "200":
          description: Celle raggiungibili calcolate dalla griglia persistita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReachableCellsResponse"
              examples:
                reachableCells:
                  value:
                    characterId: adv-01
                    reachableCells:
                      - cell: A1
                        cost: 0
                        path:
                          - A1
                        trapsOnPath: []
                      - cell: B1
                        cost: 1
                        path:
                          - A1
                          - B1
                        trapsOnPath: []
        "400":
          description: Richiesta non valida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidMovement:
                  value:
                    code: BAD_REQUEST
                    message: I punti movimento non possono essere negativi.
        "404":
          description: Sessione non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingSession:
                  value:
                    code: SESSION_NOT_FOUND
                    message: "Sessione non trovata: session-non-esistente"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
      required:
        - status
    GameEvent:
      type: object
      properties:
        eventId:
          type: string
          example: evt-000001
        eventType:
          type: string
          example: MOVE
        venueId:
          type: string
          example: venue-01
        tableId:
          type: string
          example: table-04
        sessionId:
          type: string
          example: session-20260630-001
        source:
          type: string
          example: SIMULATOR
        occurredAt:
          type: string
          format: date-time
          example: "2026-06-30T17:45:00Z"
        sequenceNumber:
          type: integer
          format: int64
          example: 2
        payload:
          type: object
          additionalProperties: true
          example:
            characterId: adv-01
            from: A3
            to: A4
      required:
        - eventId
        - eventType
        - venueId
        - tableId
        - sessionId
        - source
        - occurredAt
        - sequenceNumber
        - payload
    CreateGameSessionRequest:
      type: object
      properties:
        sessionId:
          type: string
          description: Identificativo opzionale; se assente viene generato dal backend.
          example: session-20260705-001
        venueId:
          type: string
          example: venue-01
        tableId:
          type: string
          example: table-04
        title:
          type: string
          example: Cripta del Re Caduto
        gameType:
          type: string
          example: DND
        grid:
          $ref: "#/components/schemas/MovementGrid"
      required:
        - venueId
        - tableId
        - title
        - grid
    CreateGameSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          example: session-20260705-001
        venueId:
          type: string
          example: venue-01
        tableId:
          type: string
          example: table-04
        title:
          type: string
          example: Cripta del Re Caduto
        gameType:
          type: string
          example: DND
        status:
          type: string
          example: ACTIVE
        gridWidth:
          type: integer
          example: 3
        gridHeight:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time
          example: "2026-07-05T16:00:00Z"
      required:
        - sessionId
        - venueId
        - tableId
        - title
        - gameType
        - status
        - gridWidth
        - gridHeight
        - createdAt
    ReachableCellsRequest:
      type: object
      properties:
        characterId:
          type: string
          minLength: 1
          example: adv-01
        start:
          type: string
          example: A1
        movementPoints:
          type: integer
          minimum: 0
          maximum: 100
          example: 2
        grid:
          $ref: "#/components/schemas/MovementGrid"
      required:
        - characterId
        - start
        - movementPoints
        - grid
    SessionReachableCellsRequest:
      type: object
      properties:
        characterId:
          type: string
          minLength: 1
          example: adv-01
        start:
          type: string
          example: A1
        movementPoints:
          type: integer
          minimum: 0
          maximum: 100
          example: 2
      required:
        - characterId
        - start
        - movementPoints
    MovementGrid:
      type: object
      description: La griglia deve contenere al massimo 2.500 celle complessive (width moltiplicato per height).
      properties:
        width:
          type: integer
          minimum: 1
          example: 3
        height:
          type: integer
          minimum: 1
          example: 3
        difficultCells:
          type: array
          items:
            type: string
          example: [C1]
        blockedCells:
          type: array
          items:
            type: string
          example: [A2]
        obstacleCells:
          type: array
          items:
            type: string
          example: []
        occupiedCells:
          type: array
          items:
            type: string
          example: []
        walls:
          type: array
          items:
            $ref: "#/components/schemas/MovementWall"
        traps:
          type: array
          items:
            $ref: "#/components/schemas/MovementTrap"
      required:
        - width
        - height
    MovementWall:
      type: object
      properties:
        cell:
          type: string
          example: B1
        direction:
          type: string
          enum: [NORTH, EAST, SOUTH, WEST]
          example: SOUTH
      required:
        - cell
        - direction
    MovementTrap:
      type: object
      properties:
        trapId:
          type: string
          example: trap-01
        cell:
          type: string
          example: B1
        visibility:
          type: string
          enum: [HIDDEN, REVEALED, ALWAYS_HIDDEN]
          example: HIDDEN
        armed:
          type: boolean
          example: true
      required:
        - trapId
        - cell
        - visibility
        - armed
    ReachableCellsResponse:
      type: object
      properties:
        characterId:
          type: string
          example: adv-01
        reachableCells:
          type: array
          items:
            $ref: "#/components/schemas/ReachableCell"
      required:
        - characterId
        - reachableCells
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: SESSION_NOT_FOUND
        message:
          type: string
          example: "Sessione non trovata: session-non-esistente"
      required:
        - code
        - message
    ReachableCell:
      type: object
      properties:
        cell:
          type: string
          example: B1
        cost:
          type: integer
          example: 1
        path:
          type: array
          items:
            type: string
          example: [A1, B1]
        trapsOnPath:
          description: Identificativi delle sole trappole gia rivelate ai giocatori.
          type: array
          items:
            type: string
          example: [trap-01]
      required:
        - cell
        - cost
        - path
        - trapsOnPath
