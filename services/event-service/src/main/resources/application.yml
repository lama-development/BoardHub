spring:
  application:
    name: event-service
  datasource:
    url: ${BOARDHUB_DB_URL:jdbc:postgresql://localhost:5432/boardhub_db}
    username: ${BOARDHUB_DB_USERNAME:boardhub_user}
    password: ${BOARDHUB_DB_PASSWORD:boardhub_password}
    driver-class-name: org.postgresql.Driver

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

boardhub:
  mqtt:
    broker-uri: ${BOARDHUB_MQTT_BROKER_URI:tcp://localhost:1883}
    client-id: ${BOARDHUB_MQTT_CLIENT_ID:boardhub-event-service}
    topic: ${BOARDHUB_MQTT_TOPIC:boardhub/v1/venues/venue-01/tables/table-04/events}
    qos: ${BOARDHUB_MQTT_QOS:1}
